<svg xmlns="http://www.w3.org/2000/svg" width="480" height="480" viewBox="0 0 480 480" preserveAspectRatio="none">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.4" numOctaves="3" seed="7" />
      <feColorMatrix type="matrix" values="0 0 0 0 0.18
                                           0 0 0 0 0.11
                                           0 0 0 0 0.06
                                           0 0 0 0.28 0" />
    </filter>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241710" />
      <stop offset="0.5" stop-color="#2c1d12" />
      <stop offset="1" stop-color="#1a0f08" />
    </linearGradient>
  </defs>
  <rect width="480" height="480" fill="url(#base)" />
  <rect width="480" height="480" filter="url(#grain)" opacity="0.85" />
</svg>
